name: Setup
description: Setup Env

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version-file: .nvmrc

    - name: Setup Java Env
      uses: actions/setup-java@v4
      with:
        distribution: 'microsoft'
        java-version: '17'
        cache: gradle

    - name: Get npm cache directory
      id: npm-cache-dir
      shell: bash
      run: echo "cachedir=$(npm config get cache)" >> ${GITHUB_OUTPUT}

    - name: Cache node modules
      id: cache-npm
      uses: actions/cache@v4
      with:
        # npm cache files are stored in `~/.npm` on Linux/macOS
        path: ${{ steps.npm-cache-dir.outputs.cachedir }}
        key: ${{ runner.os }}-npm-cache-${{ hashFiles('package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-npm-cache-

    - name: Install dependencies
      shell: bash
      run: npm ci

    - name: Patch gradle-plugin (disable warnings-as-errors)
      shell: bash
      run: |
        # React Native gradle-plugin 默认把警告当错误，CI 环境下会编译失败，关闭它
        PLUGIN_FILE="node_modules/@react-native/gradle-plugin/build.gradle.kts"
        if [ -f "$PLUGIN_FILE" ]; then
          sed -i 's/allWarningsAsErrors\s*=\s*true/allWarningsAsErrors = false/g' "$PLUGIN_FILE"
          echo "Patched $PLUGIN_FILE -> allWarningsAsErrors = false"
        else
          echo "gradle-plugin build.gradle.kts not found, skipping patch"
        fi
